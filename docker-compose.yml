services:
  data-service:
    build:
      context: ./data-service
    restart: unless-stopped
    environment:
      TZ: America/Santiago
      # host.docker.internal apunta al XAMPP de tu Windows
      DATA_DB_URL: jdbc:mysql://host.docker.internal:3306/data_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: 
    ports:
      - "8083:8083"
    networks:
      - cordillera-network

  kpi-service:
    build:
      context: ./kpi-service
    restart: unless-stopped
    depends_on:
      data-service:
        condition: service_started
    environment:
      TZ: America/Santiago
      KPI_DB_URL: jdbc:mysql://host.docker.internal:3306/kpi_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: 
      DATA_SERVICE_URL: http://data-service:8083
    ports:
      - "8084:8084"
    networks:
      - cordillera-network

  report-service:
    build:
      context: ./report-service
    restart: unless-stopped
    depends_on:
      kpi-service:
        condition: service_started
    environment:
      TZ: America/Santiago
      REPORT_DB_URL: jdbc:mysql://host.docker.internal:3306/report_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
      DB_USER: root
      DB_PASSWORD: 
      KPI_SERVICE_URL: http://kpi-service:8084
    ports:
      - "8085:8085"
    networks:
      - cordillera-network

  bff-gateway:
    build:
      context: .
      dockerfile: bff-gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      data-service:
        condition: service_started
      kpi-service:
        condition: service_started
      report-service:
        condition: service_started
    environment:
      TZ: America/Santiago
      DATA_SERVICE_URL: http://data-service:8083
      KPI_SERVICE_URL: http://kpi-service:8084
      REPORT_SERVICE_URL: http://report-service:8085
    ports:
      - "8081:8081"
    networks:
      - cordillera-network

networks:
  cordillera-network:
    driver: bridge