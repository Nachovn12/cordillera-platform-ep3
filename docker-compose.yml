name: cordillera-platform-parcial-3

services:

  # ─── Data Service (puerto interno 8083) ──────────────────────────────────────
  # Arranca de forma INDEPENDIENTE — no depende de ningun otro MS.
  # La BD MySQL corre en XAMPP del host Windows (host.docker.internal:3306).
  data-service:
    build:
      context: ./data-service
    restart: unless-stopped
    environment:
      TZ: America/Santiago
      DATA_DB_URL: jdbc:mysql://host.docker.internal:3306/data_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD:
    expose:
      - "8083"
    networks:
      - cordillera-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── KPI Service (puerto interno 8084) ───────────────────────────────────────
  # Arranca de forma INDEPENDIENTE — el Circuit Breaker maneja la falla de data-service.
  kpi-service:
    build:
      context: ./kpi-service
    restart: unless-stopped
    environment:
      TZ: America/Santiago
      KPI_DB_URL: jdbc:mysql://host.docker.internal:3306/kpi_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD:
      DATA_SERVICE_URL: http://data-service:8083
    expose:
      - "8084"
    networks:
      - cordillera-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Report Service (puerto interno 8085) ────────────────────────────────────
  # Arranca de forma INDEPENDIENTE — el Circuit Breaker maneja la falla de kpi-service.
  report-service:
    build:
      context: ./report-service
    restart: unless-stopped
    environment:
      TZ: America/Santiago
      REPORT_DB_URL: jdbc:mysql://host.docker.internal:3306/report_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
      DB_USER: root
      DB_PASSWORD:
      KPI_SERVICE_URL: http://kpi-service:8084
    expose:
      - "8085"
    networks:
      - cordillera-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── BFF Gateway — unico punto de entrada (puerto 8081 publicado al host) ────
  # Espera a que los 3 MS esten HEALTHY antes de aceptar trafico.
  # Si un MS cae DESPUES del arranque, los Circuit Breakers del BFF manejan el fallback.
  bff-gateway:
    build:
      context: .
      dockerfile: bff-gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      data-service:
        condition: service_healthy
      kpi-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
    environment:
      TZ: America/Santiago
      DATA_SERVICE_URL: http://data-service:8083
      KPI_SERVICE_URL: http://kpi-service:8084
      REPORT_SERVICE_URL: http://report-service:8085
      AUTH_DB_URL: jdbc:mysql://host.docker.internal:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD:
    ports:
      - "8081:8081"
    networks:
      - cordillera-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

networks:
  cordillera-network:
    driver: bridge
