<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grupo Cordillera — Plataforma Ejecutiva</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #0f172a;
        color: #94a3b8;
      }
      .container { text-align: center; max-width: 480px; padding: 2rem; }
      h1 { color: #f1f5f9; font-size: 1.5rem; margin-bottom: 0.5rem; }
      p { margin: 0.5rem 0; }
      code { background: #1e293b; padding: 0.2em 0.5em; border-radius: 4px; font-size: 0.85em; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Grupo Cordillera — BFF Gateway</h1>
      <p>El frontend React aún no ha sido compilado.</p>
      <p>Ejecuta <code>npm run build</code> en <code>frontend/</code> y copia
         el contenido de <code>dist/</code> a
         <code>bff-gateway/src/main/resources/static/</code>.</p>
      <p>En desarrollo usa <code>npm run dev</code> (puerto 3000) con el proxy Vite configurado.</p>
    </div>
  </body>
</html>
