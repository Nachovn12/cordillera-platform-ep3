server.port=8081
spring.application.name=bff-gateway

# URLs de microservicios
services.kpi.url=${KPI_SERVICE_URL:http://localhost:8084}
services.data.url=${DATA_SERVICE_URL:http://localhost:8083}
services.report.url=${REPORT_SERVICE_URL:http://localhost:8085}

# Logging
logging.level.cl.duoc.cordillera=DEBUG

# OpenAPI / Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
# Actuator - solo health para Docker healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Database (MySQL)
spring.datasource.url=${AUTH_DB_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
